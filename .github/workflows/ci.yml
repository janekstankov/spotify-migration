name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install ruff
        run: pip install ruff==0.6.9
      - name: Ruff check
        run: ruff check .
      - name: Ruff format (verify)
        run: ruff format --check .

  smoke:
    name: Import smoke (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Import all modules
        run: python -c "import migrate, auth, source, destination, prompts, utils; print('imports OK')"
      - name: CLI help does not crash
        env:
          SPOTIFY_CLIENT_ID: dummy
          SPOTIFY_CLIENT_SECRET: dummy
        run: python -c "import migrate; print(hasattr(migrate, 'main'))"
